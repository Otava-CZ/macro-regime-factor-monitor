name: .NET PR Build

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  restore-build:
    name: Restore and build (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore MacroRegimeFactorMonitor.sln

      - name: Build solution
        run: dotnet build MacroRegimeFactorMonitor.sln --configuration Release --no-restore
