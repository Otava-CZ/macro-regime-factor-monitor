name: .NET

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MacroRegimeFactorMonitor.sln

      - name: Build
        run: dotnet build MacroRegimeFactorMonitor.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MacroRegimeFactorMonitor.sln --configuration Release --no-build
