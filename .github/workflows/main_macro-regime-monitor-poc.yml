name: Build and deploy ASP.NET Core app to Azure Web App - macro-regime-monitor-poc

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'
  SOLUTION_PATH: MacroRegimeFactorMonitor.sln
  PROJECT_PATH: src/MacroRegimeFactorMonitor/MacroRegimeFactorMonitor.csproj
  AZURE_WEBAPP_NAME: macro-regime-monitor-poc
  AZURE_WEBAPP_PACKAGE_PATH: ${{ github.workspace }}/publish

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.<KEEP_AZURE_GENERATED_CLIENT_ID_SECRET_NAME> }}
          tenant-id: ${{ secrets.<KEEP_AZURE_GENERATED_TENANT_ID_SECRET_NAME> }}
          subscription-id: ${{ secrets.<KEEP_AZURE_GENERATED_SUBSCRIPTION_ID_SECRET_NAME> }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .
